name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      ENVIRONMENT: ci
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      REDIS_URL: "redis://localhost:6379/0"
      SECRET_KEY: "ci-secret-key-not-used-in-production-must-be-32-bytes-min"
      LOG_LEVEL: WARNING

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen || uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: SET LOCAL lint
        run: uv run python tools/lint_set_local.py

      - name: Validate skills (D68/D69/D70 from docs/04 §20)
        run: uv run python tools/validate_skills.py

      - name: Check SKILL.md bodies are English (D63 from docs/04 §18.2.1)
        run: uv run python tools/check_system_prompt_lang.py

      - name: Mypy
        run: uv run mypy app/

      - name: Pytest
        run: uv run pytest -v --tb=short

  backend-postgres:
    name: backend (postgres integration — RLS / PgBouncer parity)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: social_media_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      ENVIRONMENT: ci
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/social_media_ci"
      REDIS_URL: "redis://localhost:6379/0"
      SECRET_KEY: "ci-secret-key-not-used-in-production-must-be-32-bytes-min"
      LOG_LEVEL: WARNING

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen || uv sync

      - name: Alembic upgrade head (applies 0008_rls_policies)
        run: uv run alembic upgrade head

      - name: Pytest — Postgres-only integration suite
        # docs/04 §18.7 + PR #11: only the integration suite gates on
        # this job; the SQLite ``backend`` job above already runs the
        # full unit + handler suite for fast feedback.
        run: uv run pytest -v --tb=short -m postgres tests/integration

  web:
    name: web (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome lint
        run: pnpm lint

      - name: TypeScript check
        run: pnpm typecheck

      - name: Next build
        run: pnpm build
