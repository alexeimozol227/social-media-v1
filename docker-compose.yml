name: social-media-v1

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-social_media_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # docs/04-architecture.md §18.7 + docs/05-tech-stack.md §2.4.1:
  # production traffic from the FastAPI workers goes through
  # PgBouncer with ``pool_mode=transaction`` so per-request
  # ``SET LOCAL app.current_user_id`` / ``current_tenant_id`` GUCs
  # are scoped to the (implicit) transaction PgBouncer keeps open
  # to the backend connection. Dev workers can still point
  # ``DATABASE_URL`` straight at port ``5432`` while you're iterating
  # on a migration; ``DATABASE_URL_POOLED`` (port ``6432``) is the
  # production-parity URL.
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    environment:
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-social_media_dev}
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "25"
      ADMIN_USERS: ${POSTGRES_USER:-postgres}
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-postgres} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — http://localhost:8025

  # docs/plans/phase1-sprint2-plan.md PR #15: the Celery worker that
  # runs ``channel.backfill_history`` and (in later PRs) the agent
  # task queue. Lives in a sibling container so its restart loop
  # doesn't impact the API container. Sources its env from
  # ``apps/backend/.env`` so it picks up the same DB / Redis URLs +
  # ``CELERY_BROKER_URL`` / ``CELERY_RESULT_BACKEND`` as the API.
  celery-worker:
    build:
      context: ./apps/backend
    command: celery -A app.workers.celery_app worker -l info --concurrency=2
    env_file:
      - ./apps/backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - workers
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
